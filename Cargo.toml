[package]
name = "irzean"
version = "0.0.1"
publish = false
edition = "2024"
resolver = "3"

[dependencies]
axum = { version = "0.8", features = ["macros", "multipart"] }
tokio = { version = "1.43", features = ["full"] }
tower = { version = "0.5", features = ["full"] }
tower-http = { version = "0.6.2", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
