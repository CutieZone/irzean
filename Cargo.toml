[package]
name = "irzean"
version = "1.0.0"
publish = false
edition = "2024"
resolver = "3"

[dependencies]
async-walkdir = "2.0.0"
axum = { version = "0.8", features = ["macros", "multipart"] }
blake3 = "1.5.5"
color-eyre = "0.6.3"
comrak = "0.35"
futures-lite = "2.6.0"
git2 = { version = "0.20.0", features = [
  "vendored-libgit2",
  "vendored-openssl",
] }
grass = "0.13.4"
minijinja = { version = "2.6.0", features = ["loader", "speedups"] }
serde = { version = "1.0.217", features = ["derive"] }
slug = "0.1.6"
tokio = { version = "1.43", features = ["full"] }
tower = { version = "0.5", features = ["full"] }
tower-http = { version = "0.6.2", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
yaml-rust2 = "0.9.0"

[features]
default = ["development"]
development = []
production = []
